  <rect class="bg" width="1200" height="720"/>
  <text class="title" x="56" y="58">Paint Manager tab icons - restrained directions</text>
  <text class="caption" x="56" y="84">No color accents, no glossy shapes. Designed to work as 24px tab icons.</text>

  <text class="label" x="56" y="138">A. Inventory UI</text>
  <text class="caption" x="56" y="162">道具箱というより「管理アプリ」の記号に寄せた、最も無難な案</text>

  <text class="label" x="56" y="338">B. Paint Catalog</text>
  <text class="caption" x="56" y="362">塗料ボトルを共通モチーフにして、Paint Manager らしさを出す案</text>

  <text class="label" x="56" y="538">C. Minimal Tooling</text>
  <text class="caption" x="56" y="562">模型・塗装道具のニュアンスを残しつつ、タブとして硬めにまとめる案</text>

