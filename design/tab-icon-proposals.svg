<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <style>
      .bg { fill: #fbfcfd; }
      .title { font: 650 28px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #111827; }
      .label { font: 650 18px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #111827; }
      .caption { font: 450 14px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #667085; }
      .cell { fill: #fff; stroke: #e4e7ec; stroke-width: 1; rx: 8; }
      .icon { fill: none; stroke: #344054; stroke-width: 4.25; stroke-linecap: round; stroke-linejoin: round; }
      .thin { fill: none; stroke: #667085; stroke-width: 3.25; stroke-linecap: round; stroke-linejoin: round; }
      .fill { fill: #344054; }
      .muted { fill: #f2f4f7; stroke: #344054; stroke-width: 4.25; stroke-linecap: round; stroke-linejoin: round; }
